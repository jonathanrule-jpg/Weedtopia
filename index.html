  .stat{background:#1a1d27;border:0.5px solid #2a2d3a;border-radius:10px;padding:6px 12px;font-size:12px;color:#888}
  .stat b{color:#e8e8e8;font-weight:500}
  .controls{display:flex;gap:8px;margin-bottom:.9rem;align-items:center;flex-wrap:wrap}
  .tab-btn{padding:5px 14px;border-radius:20px;border:0.5px solid #2a2d3a;background:transparent;cursor:pointer;font-size:13px;color:#888;transition:all .15s}

  .cnt{font-size:12px;color:#555}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  .card{background:#1a1d27;border:0.5px solid #2a2d3a;border-radius:12px;padding:.9rem 1rem;transition:border-color .15s}
  .card:hover{border-color:#3a3d4a}
  .ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
  .cname{font-size:13px;font-weight:500;color:#fff;line-height:1.3}
  .rat{display:flex;align-items:center;gap:2px;font-size:11px;color:#888;white-space:nowrap;flex-shrink:0;margin-left:5px}
  .st{color:#ef9f27;font-size:9px}
  .badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
  .tag{font-size:10px;padding:2px 7px;border-radius:10px;background:#1a3d2e;color:#4dcc9a;font-weight:500}
  .tag-d{background:#1a2a3d;color:#5aaaff}
  .irow{display:flex;align-items:flex-start;gap:5px;font-size:11px;color:#777;margin-bottom:3px;line-height:1.4}

  .cd{width:6px;height:6px;border-radius:50%;background:#e24b4a;flex-shrink:0;margin-top:2px}
  .lnks{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:0.5px solid #2a2d3a;flex-wrap:wrap}

  .lb:hover{background:#2a2d3a;color:#e8e8e8}

  .mwrap{width:100%;height:540px;border-radius:12px;border:0.5px solid #2a2d3a;overflow:hidden}
  .empty{text-align:center;padding:2rem;color:#555;font-size:14px}
</style>

let filtered=[...D],activeCity='All',mapInst=null,markers=[];
const cities=['All',...[...new Set(D.map(d=>d.city))].sort()];

function isOpen(hours){
  const now=new Date(),day=now.getDay(),cur=now.getHours()*60+now.getMinutes();
  const line=hours.find(l=>{
    const lc=l.toLowerCase();
    if(lc.startsWith('daily'))return true;
    if(day>=1&&day<=5&&lc.startsWith('mon–fri'))return true;
    if(day>=1&&day<=4&&lc.startsWith('mon–thu'))return true;
    if(day>=1&&day<=3&&lc.startsWith('mon–wed'))return true;
    if(day===4&&lc.startsWith('thu'))return true;
    if((day===5||day===6)&&lc.startsWith('fri–sat'))return true;
    if(day===6&&lc.includes('sat'))return true;
    if(day===0&&lc.startsWith('sun'))return true;
    if(day>=1&&day<=2&&lc.startsWith('mon–tue'))return true;
    if(day>=3&&day<=6&&lc.startsWith('wed–sat'))return true;
    if(day>=1&&day<=5&&lc.startsWith('mon'))return true;
    return false;
  })||hours[0];
  const m=line.match(/(\d+)(?::(\d+))?\s*(am|pm)\s*[–-]\s*(\d+)(?::(\d+))?\s*(am|pm)/i);
  if(!m)return null;
  let sh=parseInt(m[1]),sm=parseInt(m[2]||0),sa=m[3].toLowerCase();
  let eh=parseInt(m[4]),em=parseInt(m[5]||0),ea=m[6].toLowerCase();
  if(sa==='pm'&&sh!==12)sh+=12;if(sa==='am'&&sh===12)sh=0;
  if(ea==='pm'&&eh!==12)eh+=12;if(ea==='am'&&eh===12)eh=0;
  return cur>=sh*60+sm&&cur<eh*60+em;
}

function stars(r){let s='';for(let i=1;i<=5;i++)s+=`<span class="st">${i<=Math.floor(r)?'★':'☆'}</span>`;return s;}

function buildFilters(){
  document.getElementById('filters').innerHTML=cities.map(c=>`<button class="fp${c==='All'?' active':''}" onclick="setCity('${c}',this)">${c}</button>`).join('');
}
function setCity(c,btn){
  activeCity=c;
  document.querySelectorAll('.fp').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  filtered=D.filter(d=>(activeCity==='All'||d.city===activeCity)&&(!q||d.name.toLowerCase().includes(q)||d.city.toLowerCase().includes(q)||d.addr.toLowerCase().includes(q)));
  renderList();
  if(mapInst)updateMarkers();
}
function updateStats(){
  document.getElementById('s-open').textContent=D.filter(d=>isOpen(d.hours)===true).length;
  document.getElementById('s-avg').textContent=(D.reduce((s,d)=>s+d.rating,0)/D.length).toFixed(1)+' ⭐';
  document.getElementById('s-cities').textContent=cities.length-1;
  document.getElementById('total-count').textContent=D.length;
}
function renderList(){
  const el=document.getElementById('list-view');
  document.getElementById('count').textContent=filtered.length+' spots';
  if(!filtered.length){el.innerHTML='<div class="empty">No results found.</div>';return;}
  el.innerHTML='<div class="grid">'+filtered.map(d=>{
    const open=isOpen(d.hours);
    const statusHtml=open===null?'':open
      ?`<div class="irow"><span class="od"></span><span style="color:#4dcc9a">Open now</span></div>`
      :`<div class="irow"><span class="cd"></span><span style="color:#e24b4a">Closed now</span></div>`;
    return `<div class="card">
      <div class="ctop"><div class="cname">${d.name}</div><div class="rat">${stars(d.rating)} ${d.rating}</div></div>
      <div class="badges"><span class="tag">${d.city}</span>${d.delivery?'<span class="tag tag-d">Delivery</span>':''}</div>
      <div class="irow"><span>📍</span><span>${d.addr}, ${d.city}, MA</span></div>
      <div class="irow"><span>📞</span><span>${d.phone}</span></div>
      ${statusHtml}
      <div class="irow" style="flex-direction:column;gap:1px">${d.hours.map(h=>'<span>'+h+'</span>').join('')}</div>
      <div class="lnks">
        <a class="lb" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.addr+' '+d.city+' MA')}" target="_blank">Directions</a>
        ${d.web?`<a class="lb" href="${d.web}" target="_blank">Website</a>`:''}
        <a class="lb" href="tel:${d.phone.replace(/\D/g,'')}">Call</a>
      </div>
    </div>`;
  }).join('')+'</div>';
}
function initMap(){
  if(mapInst)return;
  mapInst=L.map('map').setView([42.38,-72.57],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInst);
  updateMarkers();
}
function updateMarkers(){
  markers.forEach(m=>m.remove());markers=[];
  filtered.forEach(d=>{
    const open=isOpen(d.hours);
    const color=open===false?'#e24b4a':open===true?'#1d9e75':'#888';
    const icon=L.divIcon({html:`<div style="background:${color};width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>`,className:'',iconSize:[12,12],iconAnchor:[6,6]});
    const mk=L.marker([d.lat,d.lng],{icon}).addTo(mapInst);
    mk.bindPopup(`<b style="font-size:12px">${d.name}</b><br><span style="font-size:11px">${d.addr}, ${d.city}<br>${d.phone}</span>${d.web?`<br><a href="${d.web}" target="_blank" style="font-size:11px">Website</a>`:''}`);
    markers.push(mk);
  });
}
function setView(v,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('list-view').style.display=v==='list'?'block':'none';
  document.getElementById('map-view').style.display=v==='map'?'block':'none';
  if(v==='map'){setTimeout(()=>{initMap();mapInst.invalidateSize();},50);}
}
buildFilters();updateStats();renderList();
</script>
</body>
